
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PTBoard</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: "#0EA5E9",
            "background-dark": "#0B2B53", // Deep vivid marine blue
            "card-dark": "#133E70", // Lighter marine blue for cards
            "cta-orange": "#FF6600"
          },
          fontFamily: {
            sans: ["Lexend", "sans-serif"],
          },
        },
      },
    }
  </script>
  <style>
    body {
      transition: background-color 0.3s ease, color 0.3s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .dark body {
      background-color: #0B2B53;
      color: white;
    }
    body:not(.dark) {
      background-color: #E0F2FE; /* Soft sky blue for light mode */
      color: #0B2B53; /* Dark blue text */
    }
    ::-webkit-scrollbar {
      display: none;
    }
    .glass-effect {
      backdrop-filter: blur(12px);
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .snap-container {
      scroll-snap-type: y mandatory;
      overflow-y: auto;
      height: 100vh;
    }
    .snap-section {
      scroll-snap-align: start;
      height: 100vh;
      width: 100%;
    }
  </style>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
    "path": "https://esm.sh/path@^0.12.7",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.4",
    "vite": "https://esm.sh/vite@^7.3.1"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body>
  <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
